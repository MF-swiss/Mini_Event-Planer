services:

  postgres:
    image: postgres:16
    container_name: event-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: eventUser
      POSTGRES_PASSWORD: eventPW
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d quizdb"]
      interval: 5s
      timeout: 5s
      retries: 10



  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/quizdb
      SPRING_DATASOURCE_USERNAME: quizUser
      SPRING_DATASOURCE_PASSWORD: quizPW
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  quiz-data:
